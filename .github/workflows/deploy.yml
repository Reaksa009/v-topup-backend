name: CI/CD Production Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  laravel-tests:
    name: Run Tests & Quality Checks
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mongodb, mbstring, xml, ctype, iconv, zip, redis
        coverage: none

    - name: Copy .env file
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --ignore-platform-reqs

    - name: Validate Config and Cache
      run: |
        php artisan config:clear
        php artisan route:clear

    - name: Run Code Style Checks (Laravel Pint)
      run: php vendor/bin/pint --test

    - name: Execute Feature & Unit Tests
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
      run: php artisan test

  docker-build-scan:
    name: Compile & Scan Docker Image
    needs: laravel-tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image locally for verification
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        load: true
        tags: vtopup-backend:temp-verify

    # Verify container has no high-risk vulnerabilities
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'vtopup-backend:temp-verify'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

  docker-push-deploy:
    name: Deploy to Production
    needs: docker-build-scan
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/vtopup-backend:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/vtopup-backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/vtopup-backend:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKER_HUB_USERNAME }}/vtopup-backend:buildcache,mode=max

    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          cd /var/www/v-topup/backend
          
          # Pull the newly pushed image
          docker compose pull
          
          # Restart the FPM container zero-downtime
          docker compose up -d --no-deps --build backend
          
          # Verify APP_KEY structure before completing release configuration
          docker compose exec -T backend php -r "if (strlen(config('app.key')) !== 44) { throw new Exception('Invalid or missing APP_KEY'); }"
          
          # Set up storage symlinks safely
          docker compose exec -T backend php artisan storage:link --relative || true
          
          # Cache settings and indexes
          docker compose exec -T backend php artisan migrate --force
          docker compose exec -T backend php artisan app:create-mongo-indexes
          
          # Run optimization caching
          docker compose exec -T backend php artisan config:cache
          docker compose exec -T backend php artisan route:cache
          docker compose exec -T backend php artisan view:cache
          
          # Gracefully reload Horizon workers
          docker compose exec -T backend php artisan horizon:terminate

    - name: Send Slack Deployment Notification
      if: always()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_MESSAGE: "Deploy finished with status: ${{ job.status }}. Commit: ${{ github.sha }}"
