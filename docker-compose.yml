version: '3.8'

services:
  # Laravel App Container (PHP-FPM + Supervisor for Queue/Scheduler)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vtopup_prod_backend
    restart: always
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vtopup_network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: vtopup_prod_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - vtopup_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 3

  # Nginx Reverse Proxy
  webserver:
    image: nginx:alpine
    container_name: vtopup_prod_webserver
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - .:/var/www
      - ./docker/nginx.conf.template:/etc/nginx/templates/default.conf.template
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend
      - redis
    networks:
      - vtopup_network

volumes:
  redis_data:
    driver: local

networks:
  vtopup_network:
    driver: bridge
